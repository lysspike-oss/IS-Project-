<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Blossom Sweep</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #fff0f8 0%, #fce4f0 50%, #f8f0ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 1rem 2rem;
  }
  #gw { width: 100%; max-width: 560px; }
  h1 {
    font-size: 28px; font-weight: 800;
    color: #c2547a;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .subtitle { font-size: 13px; color: #d090b0; margin-bottom: 14px; }
  #diff-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .db {
    border: 1.5px solid #f0b8cc;
    border-radius: 20px;
    background: #fff0f5;
    padding: 5px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; color: #c2547a;
    transition: all 0.15s;
  }
  .db:hover { background: #ffe0ec; }
  .db.active { background: #f06090; border-color: #f06090; color: #fff; }
  #top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .pill {
    background: #fff0f5;
    border: 1.5px solid #f0b8cc;
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 14px; font-weight: 700;
    color: #c2547a;
    min-width: 76px; text-align: center;
  }
  #rb {
    border: 1.5px solid #f0b8cc;
    border-radius: 20px;
    background: #fff0f5;
    padding: 5px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; color: #c2547a;
    transition: all 0.15s;
  }
  #rb:hover { background: #ffe0ec; }
  #board-wrap { overflow-x: auto; }
  #board {
    display: inline-grid;
    gap: 3px;
    padding: 14px;
    background: #fff0f5;
    border: 2px solid #f0b8cc;
    border-radius: 18px;
  }
  .cell {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s, transform 0.08s;
  }
  .cell.hidden { background: #fcd6e6; border: 1.5px solid #f0a8c0; }
  .cell.hidden:hover { background: #f9c0d8; transform: scale(1.1); }
  .cell.hidden:active { transform: scale(0.93); }
  .cell.flagged { background: #ffe8f4; border: 1.5px solid #f06090; }
  .cell.revealed { background: #fff8fb; border: 1.5px solid #f5cede; cursor: default; }
  .cell.mine-hit { background: #ffc0cb; border: 1.5px solid #f06090; }
  .n1 { color: #7b68ee; } .n2 { color: #20a080; } .n3 { color: #e05070; }
  .n4 { color: #9050c0; } .n5 { color: #c06030; } .n6 { color: #208090; }
  .n7 { color: #b03060; } .n8 { color: #999; }
  #status {
    margin-top: 12px; text-align: center;
    font-size: 15px; font-weight: 700;
    min-height: 24px; color: #c2547a;
  }
  #status.win { color: #d4387a; }
  #status.lose { color: #e05070; }
  #hint { text-align: center; margin-top: 6px; font-size: 12px; color: #d090b0; }
</style>
</head>
<body>
<div id="gw">
  <h1>🌸 Blossom Sweep</h1>
  <p class="subtitle">Watch out — bombs are hiding among the flowers!</p>
  <p style="margin-bottom:14px;"><a href="scratch.html" style="color:#c2547a; text-decoration:none; font-weight:700;">Back to Crochet Guide</a></p>
  <div id="diff-row">
    <button class="db active" onclick="setDiff('easy')">🌷 Easy</button>
    <button class="db" onclick="setDiff('medium')">🌺 Medium</button>
    <button class="db" onclick="setDiff('hard')">💐 Hard</button>
  </div>
  <div id="top">
    <div style="display:flex;gap:8px">
      <div class="pill" id="mc">💣 0</div>
      <div class="pill" id="td">⏱ 0</div>
    </div>
    <button id="rb" onclick="init()">🎀 New game</button>
  </div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="status"></div>
  <div id="hint">Left click to reveal · Right click to flag 🌸</div>
</div>

<script>
const DIFFS = {
  easy:   { rows:9,  cols:9,  mines:10 },
  medium: { rows:16, cols:16, mines:40 },
  hard:   { rows:16, cols:30, mines:99 },
};
let diff='easy', grid, rows, cols, mineCount, revealed, flagged, gameOver, timeElapsed, timerInt, firstClick;

function setDiff(d) {
  diff = d;
  document.querySelectorAll('.db').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(d));
  });
  init();
}

function init() {
  clearInterval(timerInt);
  const cfg = DIFFS[diff];
  rows=cfg.rows; cols=cfg.cols; mineCount=cfg.mines;
  grid     = Array.from({length:rows}, ()=>Array(cols).fill(0));
  revealed = Array.from({length:rows}, ()=>Array(cols).fill(false));
  flagged  = Array.from({length:rows}, ()=>Array(cols).fill(false));
  gameOver=false; firstClick=true; timeElapsed=0;
  document.getElementById('td').textContent='⏱ 0';
  document.getElementById('mc').textContent='💣 '+mineCount;
  document.getElementById('status').textContent='';
  document.getElementById('status').className='';
  renderBoard();
}

function placeMines(sr, sc) {
  let p=0;
  while(p<mineCount){
    const r=Math.floor(Math.random()*rows), c=Math.floor(Math.random()*cols);
    if(grid[r][c]===-1) continue;
    if(Math.abs(r-sr)<=1 && Math.abs(c-sc)<=1) continue;
    grid[r][c]=-1; p++;
  }
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(grid[r][c]!==-1) grid[r][c]=adj(r,c);
}

function adj(r,c){
  let n=0;
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const nr=r+dr, nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&grid[nr][nc]===-1) n++;
  }
  return n;
}

function cellClass(r,c){
  if(!revealed[r][c]&&flagged[r][c]) return 'cell hidden flagged';
  if(!revealed[r][c]) return 'cell hidden';
  if(grid[r][c]===-1) return 'cell revealed mine-hit';
  return 'cell revealed'+(grid[r][c]>0?' n'+grid[r][c]:'');
}

function cellText(r,c){
  if(!revealed[r][c]&&flagged[r][c]) return '🌸';
  if(!revealed[r][c]) return '';
  if(grid[r][c]===-1) return '💣';
  return grid[r][c]>0?grid[r][c]:'';
}

function renderBoard(){
  const b=document.getElementById('board');
  b.style.gridTemplateColumns=`repeat(${cols},32px)`;
  b.innerHTML='';
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    el.className=cellClass(r,c);
    el.textContent=cellText(r,c);
    el.dataset.r=r; el.dataset.c=c;
    el.addEventListener('click', onL);
    el.addEventListener('contextmenu', onR);
    b.appendChild(el);
  }
}

function onL(e){
  const r=+e.currentTarget.dataset.r, c=+e.currentTarget.dataset.c;
  if(gameOver||revealed[r][c]||flagged[r][c]) return;
  if(firstClick){
    firstClick=false;
    placeMines(r,c);
    timerInt=setInterval(()=>{ timeElapsed++; document.getElementById('td').textContent='⏱ '+timeElapsed; },1000);
  }
  reveal(r,c);
  updateBoard();
  checkWin();
}

function onR(e){
  e.preventDefault();
  const r=+e.currentTarget.dataset.r, c=+e.currentTarget.dataset.c;
  if(gameOver||revealed[r][c]) return;
  flagged[r][c]=!flagged[r][c];
  document.getElementById('mc').textContent='💣 '+(mineCount-flagged.flat().filter(Boolean).length);
  updateCell(r,c);
}

function reveal(r,c){
  if(r<0||r>=rows||c<0||c>=cols||revealed[r][c]||flagged[r][c]) return;
  revealed[r][c]=true;
  if(grid[r][c]===-1){
    clearInterval(timerInt); gameOver=true;
    for(let rr=0;rr<rows;rr++) for(let cc=0;cc<cols;cc++) if(grid[rr][cc]===-1&&!flagged[rr][cc]) revealed[rr][cc]=true;
    document.getElementById('status').textContent='💥 Oh no! Try again, bestie 💕';
    document.getElementById('status').className='lose';
    return;
  }
  if(grid[r][c]===0) for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) reveal(r+dr,c+dc);
}

function checkWin(){
  if(gameOver) return;
  let u=0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(!revealed[r][c]) u++;
  if(u===mineCount){
    clearInterval(timerInt); gameOver=true;
    document.getElementById('status').textContent='🎀 You swept all the blossoms in '+timeElapsed+'s! 🌸';
    document.getElementById('status').className='win';
  }
}

function updateBoard(){
  const cells=document.getElementById('board').children;
  let i=0;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++,i++){
    cells[i].className=cellClass(r,c);
    cells[i].textContent=cellText(r,c);
  }
}

function updateCell(r,c){
  const cells=document.getElementById('board').children;
  const el=cells[r*cols+c];
  el.className=cellClass(r,c); el.textContent=cellText(r,c);
}

init();
</script>
</body>
</html>
